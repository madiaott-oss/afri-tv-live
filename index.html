<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPTVMEDIA</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body{background:#0f0f0f;color:#fff;font-family:Arial;margin:0;padding:20px}
    h1{text-align:center}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px}
    .card{background:#1a1a1a;padding:10px;border-radius:8px;cursor:pointer}
    .card img{width:100%;height:100px;object-fit:cover;background:#333}
    .error{color:#ff4444;font-size:12px;margin-top:5px}
  </style>
</head>
<body>
  <h1>IPTVMEDIA - TEST PARTENAIRES</h1>
  <div id="player" style="width:100%;max-width:800px;margin:20px auto"></div>
  <div class="grid" id="liste"></div>

<script>
const channels = [
  {
    name: "RTNC",
    logo: "",
    url: "COLLE ICI LE LIEN RTNC DE TON PARTENAIRE",
    category: "Généraliste"
  },
  {
    name: "METEO TV", 
    logo: "",
    url: "COLLE ICI LE LIEN METEO TV DE TON PARTENAIRE",
    category: "Généraliste"
  }
];

function play(url, name){
  document.getElementById('player').innerHTML = `
    <h3>En cours: ${name}</h3>
    <video id="vid" controls autoplay style="width:100%"></video>
    <div id="msg" class="error"></div>
  `;
  const video = document.getElementById('vid');
  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.ERROR, function(event, data) {
      document.getElementById('msg').innerText = 'ERREUR: Lien bloqué par CORS ou mort. Code: '+data.type;
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  }
}

document.getElementById('liste').innerHTML = channels.map(c => `
  <div class="card" onclick="play('${c.url}','${c.name}')">
    <img src="${c.logo || 'https://via.placeholder.com/200x100?text=NO+LOGO'}" onerror="this.style.display='none'">
    <h3>${c.name}</h3>
    <p>${c.category}</p>
  </div>
`).join('');
</script>
</body>
</html>
