<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin IPTVMEDIA V6.7</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; color: #fff; font-family: Arial; padding: 20px; }
   .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #e50914; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 4px; }
        button { background: #e50914; color: #fff; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px 5px 5px 0; font-weight: bold; }
        button:hover { background: #f40612; }
   .btn-secondary { background: #333; }
   .channel-item { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 4px; display: flex; gap: 15px; align-items: center; }
   .channel-item img { width: 60px; height: 60px; object-fit: contain; background: #000; border-radius: 4px; }
   .success { background: #1db954; padding: 10px; margin: 10px 0; border-radius: 4px; display: none; }
   .error { background: #e50914; padding: 10px; margin: 10px 0; border-radius: 4px; display: none; }
   .flex { display: flex; gap: 10px; }
   .flex input { flex: 1; }
   .note { font-size: 12px; color: #999; margin-top: -5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin IPTVMEDIA V6.7</h1>
        <div id="success" class="success">Chaîne sauvée!</div>
        <div id="error" class="error">Erreur: Remplis Nom + Lien flux</div>
        
        <h3>Ajouter / Modifier une chaîne</h3>
        <input type="text" id="nom" placeholder="Nom : ESPOIR TV HD">
        
        <div class="flex">
            <input type="text" id="logo" placeholder="Lien Logo PNG : https://...">
            <input type="file" id="logoFile" accept="image/*" style="max-width: 200px;">
        </div>
        <div class="note">Lien ou upload depuis ton PC</div>
        
        <input type="text" id="flux" placeholder="Lien m3u8 : https://...live.m3u8">
        <div class="note">Seuls les liens.m3u8 marchent dans le navigateur</div>
        
        <select id="cat">
            <option value="">Choisir catégorie</option>
            <option>NEWS</option><option>SPORT</option><option>RELIGION</option>
            <option>DIVERTISSEMENT</option><option>MUSIQUE</option><option>LOCAL</option><option>AFRIQUE</option>
        </select>
        
        <button onclick="sauver()">Sauver la chaîne</button>
        <button class="btn-secondary" onclick="exporter()">Télécharger index.html PUBLIC</button>
        <button class="btn-secondary" onclick="toutSupprimer()">Tout supprimer</button>
        
        <div class="channel-list">
            <h3>Chaînes enregistrées : <span id="count">0</span></h3>
            <div id="list"></div>
        </div>
    </div>

<script>
let channels = JSON.parse(localStorage.getItem('iptv_channels') || '[]');
let editIndex = -1;

document.getElementById('logoFile').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('logo').value = e.target.result;
        };
        reader.readAsDataURL(file);
    }
});

function afficher() {
    document.getElementById('list').innerHTML = channels.map((c,i) => `
        <div class="channel-item">
            <img src="${c.logo || 'https://via.placeholder.com/60x60/333/fff?text=TV'}" onerror="this.src='https://via.placeholder.com/60x60/333/fff?text=TV'">
            <div style="flex:1">
                <strong>${c.nom}</strong><br>
                <small>${c.cat} | ${c.flux.substring(0,50)}...</small>
            </div>
            <div>
                <button onclick="modifier(${i})">Modifier</button>
                <button class="btn-secondary" onclick="supprimer(${i})">X</button>
            </div>
        </div>
    `).join('');
    document.getElementById('count').innerText = channels.length;
}

function sauver() {
    const ch = {
        nom: nom.value.trim(),
        logo: logo.value.trim(),
        flux: flux.value.trim(),
        cat: cat.value
    };
    if(!ch.nom ||!ch.flux) {
        showError();
        return;
    }
    
    if(editIndex >= 0) channels[editIndex] = ch;
    else channels.push(ch);
    
    localStorage.setItem('iptv_channels', JSON.stringify(channels));
    nom.value = logo.value = flux.value = cat.value = logoFile.value = '';
    editIndex = -1;
    afficher();
    showSuccess();
}

function modifier(i) {
    editIndex = i;
    nom.value = channels[i].nom;
    logo.value = channels[i].logo;
    flux.value = channels[i].flux;
    cat.value = channels[i].cat;
    window.scrollTo(0,0);
}

function supprimer(i) {
    if(confirm('Supprimer '+channels[i].nom+'?')) {
        channels.splice(i,1);
        localStorage.setItem('iptv_channels', JSON.stringify(channels));
        afficher();
    }
}

function toutSupprimer() {
    if(confirm('Supprimer TOUTES les chaînes?')) {
        channels = [];
        localStorage.setItem('iptv_channels', JSON.stringify(channels));
        afficher();
    }
}

function exporter() {
    const html = `<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTVMEDIA - Live TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"><\/script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: Arial; }
      .header { background: #e50914; padding: 15px 20px; text-align: center; }
      .container { max-width: 1400px; margin: 0 auto; padding: 20px; display: flex; gap: 20px; }
      .player { flex: 1; }
        video { width: 100%; background: #000; border-radius: 8px; }
      .liste { width: 350px; background: #1a1a1a; border-radius: 8px; padding: 15px; max-height: 80vh; overflow-y: auto; }
      .chaine { display: flex; gap: 10px; padding: 10px; margin: 5px 0; background: #2a2a2a; border-radius: 4px; cursor: pointer; align-items: center; }
      .chaine:hover { background: #e50914; }
      .chaine img { width: 50px; height: 50px; object-fit: contain; background: #000; border-radius: 4px; }
      .chaine.active { background: #e50914; }
      .cat { font-size: 11px; color: #999; }
        #titre { margin: 10px 0; font-size: 24px; }
        @media (max-width: 900px) {.container { flex-direction: column; }.liste { width: 100%; } }
    </style>
</head>
<body>
    <div class="header"><h1>IPTVMEDIA</h1></div>
    <div class="container">
        <div class="player">
            <video id="video" controls autoplay></video>
            <h2 id="titre">Sélectionne une chaîne</h2>
        </div>
        <div class="liste" id="liste"></div>
    </div>
<script>
const CHANNELS = ${JSON.stringify(channels, null, 2)};
const video = document.getElementById('video');
let hls;

function jouer(flux, nom, index) {
    document.getElementById('titre').innerText = nom;
    document.querySelectorAll('.chaine').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.chaine')[index].classList.add('active');
    
    if(hls) hls.destroy();
    if(Hls.isSupported()) {
        hls = new Hls();
        hls.loadSource(flux);
        hls.attachMedia(video);
    } else if(video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = flux;
    }
}

document.getElementById('liste').innerHTML = CHANNELS.map((c,i) => \`
    <div class="chaine" onclick="jouer('\${c.flux}','\${c.nom}',\${i})">
        <img src="\${c.logo || 'https://via.placeholder.com/50x50/333/fff?text=TV'}" onerror="this.src='https://via.placeholder.com/50x50/333/fff?text=TV'">
        <div>
            <strong>\${c.nom}</strong><br>
            <span class="cat">\${c.cat}</span>
        </div>
    </div>
\`).join('');

if(CHANNELS.length > 0) jouer(CHANNELS[0].flux, CHANNELS[0].nom, 0);
<\/script>
</body>
</html>`;
    
    const blob = new Blob([html], {type: 'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'index.html'; a.click();
}

function showSuccess() {
    document.getElementById('success').style.display = 'block';
    document.getElementById('error').style.display = 'none';
    setTimeout(() => document.getElementById('success').style.display = 'none', 2000);
}

function showError() {
    document.getElementById('error').style.display = 'block';
    setTimeout(() => document.getElementById('error').style.display = 'none', 2000);
}

afficher();
</script>
</body>
</html>
